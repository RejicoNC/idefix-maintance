<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>idefix.nc — Maintenance</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf5ff 0%, #fff0fa 50%, #f0f9ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(162, 29, 110, 0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 48px 40px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      max-width: 280px;
      width: 100%;
      height: auto;
      margin-bottom: 36px;
    }

    .icon-wrench {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35 0%, #e91e8c 50%, #7c3aed 100%);
      margin-bottom: 24px;
    }

    .icon-wrench svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .return-date {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b3520, #e91e8c20);
      border: 1.5px solid #e91e8c40;
      border-radius: 12px;
      padding: 14px 28px;
      margin-bottom: 36px;
    }

    .return-date .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #e91e8c;
      margin-bottom: 4px;
    }

    .return-date .date {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #f0e6f6;
      margin: 0 0 28px;
    }

    .contact-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 16px;
    }

    .contact-phone {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      text-decoration: none;
      display: block;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .contact-phone:hover { color: #e91e8c; }

    .social-links {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s;
      border: 1.5px solid transparent;
    }

    .social-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .social-link.facebook {
      background: #1877f210;
      color: #1877f2;
      border-color: #1877f230;
    }

    .social-link.facebook:hover {
      background: #1877f2;
      color: #fff;
      border-color: #1877f2;
    }

    .social-link.instagram {
      background: #e91e8c10;
      color: #e91e8c;
      border-color: #e91e8c30;
    }

    .social-link.instagram:hover {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: #fff;
      border-color: transparent;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      h1 { font-size: 1.4rem; }
      .logo { max-width: 220px; }
      .social-links { flex-direction: column; align-items: center; }
      .social-link { width: 200px; justify-content: center; }
    }
  </style>
</head>
